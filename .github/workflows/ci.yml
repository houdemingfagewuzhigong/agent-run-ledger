name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: python3 -m unittest discover -s tests -q
      - name: Verify SARIF export shape
        run: python3 agent_run_ledger.py export --format sarif > agent-ledger.sarif || true
